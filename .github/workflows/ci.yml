name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  firmware-host-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firmware/keymaps/codex_micro_configurable_v1_3
    steps:
      - uses: actions/checkout@v7
      - name: Protocol tests
        run: |
          gcc -std=c11 -Wall -Wextra -Werror -DCODEX_MICRO_HOST_TEST -Itools -I. \
            codex_micro_protocol.c codex_micro_alerts.c codex_micro_settings.c \
            kb16_config.c kb16_config_transport.c tools/protocol_test.c \
            -o tools/protocol_test
          ./tools/protocol_test
      - name: Configuration tests
        run: |
          gcc -std=c11 -Wall -Wextra -Werror -DCODEX_MICRO_HOST_TEST -Itools -I. \
            kb16_config.c tools/config_test.c -o tools/config_test
          ./tools/config_test
      - name: Settings tests
        run: |
          gcc -std=c11 -Wall -Wextra -Werror -DCODEX_MICRO_HOST_TEST -Itools -I. \
            kb16_config.c codex_micro_settings.c tools/settings_test.c -o tools/settings_test
          ./tools/settings_test
      - name: Alert tests
        run: |
          gcc -std=c11 -Wall -Wextra -Werror -DCODEX_MICRO_HOST_TEST -Itools -I. \
            kb16_config.c codex_micro_settings.c codex_micro_alerts.c tools/alerts_test.c -o tools/alerts_test
          ./tools/alerts_test
      - name: Menu tests
        run: |
          gcc -std=c11 -Wall -Wextra -Werror -DCODEX_MICRO_HOST_TEST -Itools -I. \
            kb16_config.c codex_micro_settings.c codex_micro_menu.c tools/menu_test.c -o tools/menu_test
          ./tools/menu_test
      - name: OLED tests
        run: |
          gcc -std=c11 -Wall -Wextra -Werror -DCODEX_MICRO_HOST_TEST -Itools -I. \
            oled_icons.c tools/oled_test.c -o tools/oled_test
          ./tools/oled_test
      - name: Static compatibility validation
        run: python3 tools/validate_keymap.py

  mapper-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x
      - name: Restore Mapper dependencies
        run: dotnet restore mapper/Doio.Kb16.Mapper.Tests/Doio.Kb16.Mapper.Tests.csproj --locked-mode
      - name: Mapper tests
        run: dotnet run --project mapper/Doio.Kb16.Mapper.Tests/Doio.Kb16.Mapper.Tests.csproj -c Release --no-restore
      - name: Firmware descriptor validation
        shell: pwsh
        run: >-
          ./firmware/keymaps/codex_micro_configurable_v1_3/tools/validate_binary.ps1
          -Binary ./firmware/releases/v1.4.0/doio_kb16_rev2_codex_micro_oled_v1_4_0.bin
